<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>太极拳 - 留言</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="top">
        <img class="logo" src="./images/logo.png" alt="太极拳logo">
    </div>
    <nav>
        <a href="./index.html">首页</a>
        <a href="./yuanze.html">原则特点</a>
        <a href="./lihsi.html">历史渊源</a>
        <a href="./lianxi.html">练习要点</a>
        <a href="./fenlei.html">拳术分类</a>
        <a href="./message.html">留言</a>
    </nav>
    <div id="con">
        <header>
            <div id="banner"></div>
        </header>
        <main>
            <div id="mian_left">
                <img src="./images/index2.jpg" alt="">
                <table class="mian_left_table">
                    <tr><td>中文名</td><td>太极拳</td></tr>
                    <tr><td>批准时间</td><td>2006年</td></tr>
                    <tr><td>非遗级别</td><td>人类非遗</td></tr>
                    <tr><td>申报地区</td><td>河北省永年县、河南省焦作市</td></tr>
                    <tr><td>遗产类别</td><td>杂技与竞技</td></tr>
                    <tr><td>代表人物</td><td>施承志、陈正雷、杨振铎、李秉慈、孙婉容等</td></tr>
                </table>
            </div>
            <div id="main_right">
                <h1>欢迎留言</h1>
                <img class="liuyanpng" src="./images/ban1.png" alt="">
                <div id="msg_div">
                    <form id="myForm">
                        <div class="input1">
                            <p>昵称:</p>
                            <input type="text" id="nickname">
                        </div>
                        <div class="input1">
                            <p>邮箱:</p>
                            <input type="email" id="email">
                        </div>
                        <div>
                            <p>性别:</p>
                            <input type="radio" name="sex" id="male">男
                            <input type="radio" name="sex" id="female">女
                        </div>
                        <div>
                            <p>留言:</p>
                            <textarea name="message" id="message">欢迎留言</textarea>
                        </div>
                        <div id="bottom_button">
                            <button type="button">发送</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="clear"></div>
            <div class="bottom_img">
                <img src="./images/index3.png" alt="">
            </div>
        </main>
    </div>
    <footer>版权所有©太极拳</footer>
</body>
</html>
